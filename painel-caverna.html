<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — Caverna do Açaí</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--dp:#0d0010;--dk:#1a0028;--mid:#3d0060;--viv:#7b00cc;--bri:#a020f0;--glo:#c060ff;--lig:#e0a0ff;--pnk:#ff00cc;--gld:#ffd700;--dim:#c0a0d0;--green:#22cc66;--orange:#ff9f1c;--red:#ff4466}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dp);color:#fff;font-family:'Exo 2',sans-serif;min-height:100vh}

/* HEADER */
.header{background:linear-gradient(135deg,var(--dk),var(--mid));padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(160,32,240,.3);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header h1{font-family:'Orbitron',monospace;font-size:1.3rem;background:linear-gradient(135deg,#fff,var(--lig),var(--bri));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-stats{display:flex;gap:1.5rem}
.stat-box{text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gld)}
.stat-label{font-size:.7rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.live-dot{width:10px;height:10px;background:var(--green);border-radius:50%;display:inline-block;animation:blink 1.5s infinite;margin-right:.5rem}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;padding:2rem;max-width:1600px;margin:0 auto}
@media(max-width:900px){.kanban{grid-template-columns:1fr;padding:1rem}}
.col{background:linear-gradient(180deg,rgba(26,0,40,.8),rgba(13,0,16,.6));border:1px solid rgba(160,32,240,.2);border-radius:20px;padding:1.2rem;min-height:60vh}
.col-head{font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;letter-spacing:.1em;padding:.8rem 1rem;border-radius:12px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.col-head .badge{background:rgba(0,0,0,.4);padding:.2rem .7rem;border-radius:20px;font-size:.75rem;font-family:'Bebas Neue',sans-serif}
.col-novo .col-head{background:linear-gradient(135deg,rgba(123,0,204,.4),rgba(255,0,204,.2));color:var(--lig)}
.col-preparo .col-head{background:linear-gradient(135deg,rgba(255,159,28,.3),rgba(255,159,28,.1));color:var(--orange)}
.col-concluido .col-head{background:linear-gradient(135deg,rgba(34,204,102,.3),rgba(34,204,102,.1));color:var(--green)}
.col-body{display:flex;flex-direction:column;gap:.75rem}

/* CARD PEDIDO */
.order-card{background:linear-gradient(135deg,rgba(61,0,96,.5),rgba(13,0,16,.8));border:1px solid rgba(160,32,240,.25);border-radius:16px;padding:1rem;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.order-card::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);transform:skewX(-20deg);transition:left .5s}
.order-card:hover::after{left:150%}
.order-card:hover{border-color:var(--bri);transform:translateY(-3px);box-shadow:0 10px 30px rgba(160,32,240,.3)}
.order-card.new-pulse{animation:newPulse .6s ease}
@keyframes newPulse{0%{transform:scale(.95);opacity:.5}50%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}
.oc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.oc-num{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;color:var(--gld)}
.oc-time{font-size:.7rem;color:var(--dim)}
.oc-client{font-weight:700;font-size:.9rem;margin-bottom:.3rem}
.oc-addr{font-size:.78rem;color:var(--dim);margin-bottom:.5rem;display:flex;align-items:flex-start;gap:.3rem}
.oc-items{font-size:.78rem;color:var(--lig);line-height:1.6;margin-bottom:.5rem;padding:.5rem;background:rgba(0,0,0,.25);border-radius:8px}
.oc-pay{display:inline-block;font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:20px;letter-spacing:.05em;text-transform:uppercase}
.pay-pix{background:rgba(34,204,102,.2);color:var(--green);border:1px solid rgba(34,204,102,.3)}
.pay-cartao{background:rgba(160,32,240,.2);color:var(--lig);border:1px solid rgba(160,32,240,.3)}
.pay-dinheiro{background:rgba(255,215,0,.15);color:var(--gld);border:1px solid rgba(255,215,0,.3)}
.oc-total{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--gld);margin-top:.5rem}
.oc-obs{font-size:.75rem;color:var(--orange);font-style:italic;margin-top:.4rem;padding:.4rem .6rem;background:rgba(255,159,28,.08);border-radius:6px;border-left:3px solid var(--orange)}
.oc-actions{display:flex;gap:.5rem;margin-top:.75rem}
.oc-btn{flex:1;padding:.5rem;border:none;border-radius:10px;font-family:'Exo 2',sans-serif;font-weight:700;font-size:.75rem;cursor:pointer;transition:all .2s;letter-spacing:.05em}
.oc-btn:hover{transform:scale(1.03)}
.btn-next{background:linear-gradient(135deg,var(--viv),var(--pnk));color:#fff}
.btn-print{background:rgba(255,255,255,.1);color:var(--lig);border:1px solid rgba(160,32,240,.3) !important}
.btn-pix-view{background:rgba(34,204,102,.15);color:var(--green);border:1px solid rgba(34,204,102,.3) !important}

/* MODAL COMPROVANTE */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:linear-gradient(135deg,var(--dk),var(--dp));border:1px solid rgba(160,32,240,.4);border-radius:20px;padding:2rem;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-box img{width:100%;border-radius:12px;margin-top:1rem}
.modal-close{position:absolute;top:1rem;right:1rem;background:transparent;border:none;color:var(--dim);font-size:1.5rem;cursor:pointer}
.modal-close:hover{color:#fff}
.modal-title{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--lig)}

/* AUDIO NOTIFY */
.sound-toggle{background:rgba(61,0,96,.4);border:1px solid rgba(160,32,240,.3);border-radius:10px;padding:.5rem 1rem;color:var(--lig);cursor:pointer;font-size:.85rem;display:flex;align-items:center;gap:.4rem}
.sound-toggle:hover{border-color:var(--bri)}

/* EMPTY STATE */
.empty-col{text-align:center;padding:2rem 1rem;color:var(--dim);font-size:.85rem}
.empty-col span{font-size:2.5rem;display:block;margin-bottom:.75rem;opacity:.4}

/* PRINT STYLES */
@media print{
  body{background:#fff !important;color:#000 !important}
  .header,.kanban,.modal-overlay,.sound-toggle{display:none !important}
  #printArea{display:block !important;padding:0;margin:0;font-family:'Courier New',monospace;font-size:11px;width:80mm;color:#000}
  #printArea *{color:#000 !important}
  .print-header{text-align:center;border-bottom:2px dashed #000;padding-bottom:8px;margin-bottom:8px}
  .print-header h2{font-size:16px;margin-bottom:2px}
  .print-header p{font-size:10px}
  .print-divider{border-top:1px dashed #000;margin:6px 0}
  .print-item{display:flex;justify-content:space-between;padding:2px 0;font-size:11px}
  .print-total{font-size:14px;font-weight:bold;border-top:2px dashed #000;padding-top:6px;margin-top:6px;display:flex;justify-content:space-between}
  .print-info{font-size:10px;margin-top:4px}
  .print-obs{font-size:10px;font-style:italic;margin-top:6px;border:1px dashed #000;padding:4px}
  .print-footer{text-align:center;font-size:9px;margin-top:10px;border-top:1px dashed #000;padding-top:6px}
  @page{size:80mm auto;margin:2mm}
}
#printArea{display:none}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--dp)}
::-webkit-scrollbar-thumb{background:var(--viv);border-radius:3px}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:1rem">
    <h1>🫐 Caverna do Açaí — Painel</h1>
    <span style="font-size:.8rem;color:var(--dim)"><span class="live-dot"></span>Tempo Real</span>
  </div>
  <div class="header-stats">
    <div class="stat-box"><div class="stat-num" id="sNovos">0</div><div class="stat-label">Novos</div></div>
    <div class="stat-box"><div class="stat-num" id="sPreparo">0</div><div class="stat-label">Preparo</div></div>
    <div class="stat-box"><div class="stat-num" id="sHoje">0</div><div class="stat-label">Hoje</div></div>
    <div class="stat-box"><div class="stat-num" id="sFat">R$ 0</div><div class="stat-label">Faturamento</div></div>
    <button class="sound-toggle" id="soundBtn" onclick="toggleSound()">🔔 Som</button>
  </div>
</div>

<div class="kanban">
  <div class="col col-novo">
    <div class="col-head">🆕 Novos Pedidos <span class="badge" id="bNovos">0</span></div>
    <div class="col-body" id="colNovo"></div>
  </div>
  <div class="col col-preparo">
    <div class="col-head">🔥 Em Preparo <span class="badge" id="bPreparo">0</span></div>
    <div class="col-body" id="colPreparo"></div>
  </div>
  <div class="col col-concluido">
    <div class="col-head">✅ Concluído <span class="badge" id="bConcluido">0</span></div>
    <div class="col-body" id="colConcluido"></div>
  </div>
</div>

<!-- MODAL COMPROVANTE PIX -->
<div class="modal-overlay" id="pixModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closePixModal()">✕</button>
    <div class="modal-title">📱 Comprovante PIX</div>
    <img id="pixModalImg" src="" alt="Comprovante">
  </div>
</div>

<!-- AREA DE IMPRESSÃO 80mm -->
<div id="printArea"></div>

<script>
// ── CONFIG SUPABASE ─────────────────────────────────────────────────────────
const SB = 'https://qlgfykalfqtwvhqkpahu.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZ2Z5a2FsZnF0d3ZocWtwYWh1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2MzczOTM5NiwiZXhwIjoyMDc5MzE1Mzk2fQ.qP6LHhQLAF5oSzkF4u1VAjV9Q-BTwexI5Cxsql76dZE';
const H  = { apikey: SK, Authorization: 'Bearer ' + SK, 'Content-Type': 'application/json' };

// ── STATE ───────────────────────────────────────────────────────────────────
let pedidos = [];
let knownIds = new Set();
let soundOn = true;
let audioCtx = null;

// ── SUPABASE HELPERS ────────────────────────────────────────────────────────
async function sbGet(table, q='') {
  try {
    const r = await fetch(`${SB}/rest/v1/${table}${q}`, { headers: H });
    if (!r.ok) {
      const txt = await r.text();
      console.error(`Erro na busca (${table}):`, txt);
      return [];
    }
    return await r.json();
  } catch (e) {
    console.error(`Falha de rede ao buscar ${table}:`, e);
    return [];
  }
}

async function sbUpdate(table, id, data) {
  try {
    const r = await fetch(`${SB}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...H, Prefer: 'return=representation' },
      body: JSON.stringify(data)
    });
    return r.ok;
  } catch (e) {
    console.error('Erro ao atualizar pedido:', e);
    return false;
  }
}

// ── LOAD PEDIDOS & POLLING ───────────────────────────────────────────────────
async function loadPedidos() {
  const today = new Date(); today.setHours(0,0,0,0);
  const iso = today.toISOString();
  // Busca pedidos de hoje
  const data = await sbGet('pedidos_caverna', `?created_at=gte.${iso}&order=created_at.desc`);
  
  if (Array.isArray(data)) {
    // Detecta novos para notificação
    const newOrders = data.filter(p => !knownIds.has(p.id) && p.status === 'novo');
    
    pedidos = data;
    data.forEach(p => knownIds.add(p.id));

    if (newOrders.length > 0) {
      playNotif();
      render(); // Renderiza para criar os elementos antes de adicionar a classe
      newOrders.forEach(p => {
        const el = document.getElementById('card-' + p.id);
        if (el) el.classList.add('new-pulse');
      });
    } else {
      render();
    }
  }
}

// Polling consolidado a cada 3 segundos para resposta rápida
async function startPolling() {
  await loadPedidos(); // Carga inicial
  setInterval(loadPedidos, 3000);
}
startPolling();

// ── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const novos = pedidos.filter(p => p.status === 'novo');
  const preparo = pedidos.filter(p => p.status === 'preparo');
  const concluidos = pedidos.filter(p => p.status === 'concluido');

  document.getElementById('colNovo').innerHTML = novos.length
    ? novos.map(p => cardHTML(p, 'novo')).join('')
    : '<div class="empty-col"><span>📭</span>Nenhum pedido novo</div>';

  document.getElementById('colPreparo').innerHTML = preparo.length
    ? preparo.map(p => cardHTML(p, 'preparo')).join('')
    : '<div class="empty-col"><span>⏳</span>Nenhum em preparo</div>';

  document.getElementById('colConcluido').innerHTML = concluidos.length
    ? concluidos.map(p => cardHTML(p, 'concluido')).join('')
    : '<div class="empty-col"><span>✨</span>Nenhum concluído</div>';

  // Stats
  document.getElementById('bNovos').textContent = novos.length;
  document.getElementById('bPreparo').textContent = preparo.length;
  document.getElementById('bConcluido').textContent = concluidos.length;
  document.getElementById('sNovos').textContent = novos.length;
  document.getElementById('sPreparo').textContent = preparo.length;
  document.getElementById('sHoje').textContent = pedidos.length;
  const fat = pedidos.filter(p=>p.status!=='cancelado').reduce((s,p) => s + (+p.total||0), 0);
  document.getElementById('sFat').textContent = 'R$ ' + fmtR(fat);
}

function cardHTML(p, stage) {
  const itens = parseItens(p);
  const dt = new Date(p.created_at);
  const hora = dt.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  const payClass = p.forma_pagamento === 'pix' ? 'pay-pix' : p.forma_pagamento === 'cartao' ? 'pay-cartao' : 'pay-dinheiro';
  const payLabel = p.forma_pagamento === 'pix' ? '📱 PIX' : p.forma_pagamento === 'cartao' ? '💳 Cartão' : '💵 Dinheiro';

  let actions = '';
  if (stage === 'novo') {
    actions = `<button class="oc-btn btn-next" onclick="moveOrder('${p.id}','preparo')">🔥 Iniciar Preparo</button>`;
  } else if (stage === 'preparo') {
    actions = `<button class="oc-btn btn-next" onclick="moveOrder('${p.id}','concluido')">✅ Concluir</button>`;
  }
  actions += `<button class="oc-btn btn-print" onclick="printOrder('${p.id}')">🖨️</button>`;
  if (p.forma_pagamento === 'pix' && p.comprovante_url) {
    actions += `<button class="oc-btn btn-pix-view" onclick="viewPix('${p.comprovante_url}')">📱</button>`;
  }

  const trocoInfo = (p.forma_pagamento === 'dinheiro' && p.troco) 
    ? `<div style="font-size:.72rem;color:var(--gld);margin-top:.2rem">💰 Troco p/ R$ ${fmtR(p.troco)}</div>` : '';

  return `<div class="order-card" id="card-${p.id}">
    <div class="oc-top">
      <span class="oc-num">#${p.numero_pedido || '—'}</span>
      <span class="oc-time">⏰ ${hora}</span>
    </div>
    <div class="oc-client">👤 ${esc(p.nome_cliente)}</div>
    <div class="oc-addr">📍 ${esc(p.endereco || '')}${p.endereco_complemento ? ' — '+esc(p.endereco_complemento) : ''}</div>
    <div style="font-size:.75rem;color:var(--dim);margin-bottom:.4rem">📞 ${esc(p.telefone)}</div>
    <div class="oc-items">${itens.map(i => `${i.emoji||'🫐'} ${i.nome} ×${i.qty} — R$ ${fmtR(i.preco * i.qty)}${i.descricao ? '<br><span style="color:var(--dim);font-size:.7rem">  '+esc(i.descricao)+'</span>' : ''}`).join('<br>')}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem">
      <span class="oc-pay ${payClass}">${payLabel}</span>
      <span class="oc-total">R$ ${fmtR(p.total)}</span>
    </div>
    ${trocoInfo}
    ${p.observacoes ? `<div class="oc-obs">📝 ${esc(p.observacoes)}</div>` : ''}
    <div class="oc-actions">${actions}</div>
  </div>`;
}

// ── PARSE ITENS ─────────────────────────────────────────────────────────────
function parseItens(p) {
  if (!p.itens) return [];
  if (typeof p.itens === 'string') { try { return JSON.parse(p.itens); } catch { return []; } }
  return Array.isArray(p.itens) ? p.itens : [];
}

// ── ACTIONS ─────────────────────────────────────────────────────────────────
async function moveOrder(id, newStatus) {
  await sbUpdate('pedidos_caverna', id, { status: newStatus, updated_at: new Date().toISOString() });
  const p = pedidos.find(x => x.id === id);
  if (p) p.status = newStatus;
  render();
}

function viewPix(url) {
  document.getElementById('pixModalImg').src = url;
  document.getElementById('pixModal').classList.add('open');
}
function closePixModal() {
  document.getElementById('pixModal').classList.remove('open');
}
document.getElementById('pixModal').addEventListener('click', e => {
  if (e.target === document.getElementById('pixModal')) closePixModal();
});

// ── IMPRESSÃO 80mm ──────────────────────────────────────────────────────────
function printOrder(id) {
  const p = pedidos.find(x => x.id === id); if (!p) return;
  const itens = parseItens(p);
  const dt = new Date(p.created_at);
  const dataStr = dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  const payLabel = p.forma_pagamento === 'pix' ? 'PIX' : p.forma_pagamento === 'cartao' ? 'CARTÃO' : 'DINHEIRO';

  let html = `
    <div class="print-header">
      <h2>CAVERNA DO AÇAÍ</h2>
      <p>${dataStr} — #${p.numero_pedido || '—'}</p>
    </div>
    <div class="print-divider"></div>
    <div class="print-info"><strong>Cliente:</strong> ${esc(p.nome_cliente)}</div>
    <div class="print-info"><strong>Tel:</strong> ${esc(p.telefone)}</div>
    <div class="print-info"><strong>End:</strong> ${esc(p.endereco||'')}${p.endereco_complemento ? ' — '+esc(p.endereco_complemento) : ''}</div>
    <div class="print-divider"></div>`;

  itens.forEach(i => {
    html += `<div class="print-item"><span>${i.qty}x ${i.nome}</span><span>R$ ${fmtR(i.preco * i.qty)}</span></div>`;
    if (i.descricao) html += `<div class="print-info" style="font-size:9px;padding-left:8px">  → ${i.descricao}</div>`;
  });

  html += `<div class="print-total"><span>TOTAL</span><span>R$ ${fmtR(p.total)}</span></div>`;
  html += `<div class="print-info"><strong>Pagamento:</strong> ${payLabel}</div>`;
  if (p.forma_pagamento === 'dinheiro' && p.troco) {
    html += `<div class="print-info"><strong>Troco para:</strong> R$ ${fmtR(p.troco)}</div>`;
  }
  if (p.observacoes) html += `<div class="print-obs">OBS: ${esc(p.observacoes)}</div>`;
  html += `<div class="print-footer">Obrigado pela preferência! 🫐<br>Caverna do Açaí</div>`;

  document.getElementById('printArea').innerHTML = html;
  setTimeout(() => window.print(), 200);
}

// ── SOUND ────────────────────────────────────────────────────────────────────
function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '🔔 Som' : '🔇 Mudo';
}

function playNotif() {
  if (!soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
    osc.frequency.setValueAtTime(1320, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.4);
  } catch(e) {}
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function fmtR(v) { return Number(v).toFixed(2).replace('.', ','); }
function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

// ── INIT ────────────────────────────────────────────────────────────────────
(async function init() {
  await loadPedidos();
  pedidos.forEach(p => knownIds.add(p.id));
  render();
})();
</script>
</body>
</html>
